name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sketchly-frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: sketchly-frontend
        run: npm ci
      
      - name: Lint
        working-directory: sketchly-frontend
        run: npm run lint
      
      - name: Build
        working-directory: sketchly-frontend
        run: npm run build

  backend:
    name: Backend Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: sketchly-backend/requirements.txt
      
      - name: Install dependencies
        working-directory: sketchly-backend
        run: pip install -r requirements.txt
