services:
  - type: web
    name: sketchly-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        fromService:
          type: web
          name: sketchly-backend
          envVarKey: PORT
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
